<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dead Stock - Curated thrift streetwear. Rare vintage jackets, watches, rings & accessories. Second life for your drip." />
  <title>DEAD STOCK | Rare Finds. Second Lives.</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 2rem;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .nav-logo { font-size: 14px; font-weight: 700; letter-spacing: 4px; color: rgba(255,255,255,0.7); text-decoration: none; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }

    /* HERO - Improved */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 6rem 2rem 4rem;
      overflow: hidden;
    }
    .hero-bg-photo {
      position: absolute; inset: 0; z-index: 0;
      background: url('assets/bg-graffiti.jpg') center/cover no-repeat;
      background-color: #1a1212;
    }
    .hero-bg-photo::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(ellipse 500px 400px at 5% 10%, rgba(200,20,20,0.35) 0%, transparent 65%),
                        radial-gradient(ellipse 400px 350px at 90% 5%, rgba(0,160,255,0.25) 0%, transparent 65%),
                        radial-gradient(ellipse 450px 300px at 50% 90%, rgba(180,0,220,0.2) 0%, transparent 65%),
                        radial-gradient(ellipse 300px 250px at 15% 85%, rgba(255,200,0,0.2) 0%, transparent 65%),
                        radial-gradient(ellipse 350px 280px at 80% 70%, rgba(0,210,110,0.18) 0%, transparent 65%),
                        radial-gradient(ellipse 200px 200px at 60% 30%, rgba(255,80,0,0.15) 0%, transparent 65%);
    }
    .graffiti-tags {
      position: absolute; inset: 0; z-index: 1; overflow: hidden; pointer-events: none;
    }
    .tag {
      position: absolute;
      font-family: Impact, 'Arial Black', sans-serif;
      font-weight: 900; font-style: italic;
      text-transform: uppercase; line-height: 1; letter-spacing: -3px;
      -webkit-text-stroke: 3px currentColor;
      color: transparent; opacity: 0.11;
    }
    .hero-overlay {
      position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.15) 45%, rgba(0,0,0,0.75) 100%);
    }
    .hero-content {
      position: relative; z-index: 5;
      display: flex; flex-direction: column; align-items: center;
    }
    .logo-wrap { position: relative; margin-bottom: 1rem; }
    .logo-glow {
      position: absolute; inset: -30px;
      background: radial-gradient(ellipse, rgba(220,30,30,0.4) 0%, transparent 70%);
      filter: blur(24px); z-index: 0;
    }
    .logo-img {
      width: 290px; max-width: 75vw;
      position: relative; z-index: 1;
      filter: drop-shadow(0 6px 30px rgba(0,0,0,0.95));
    }
    .hero-sub { font-size: 10px; letter-spacing: 5px; color: rgba(255,255,255,0.45); margin-bottom: 2.5rem; text-transform: uppercase; }
    .hero-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
    .btn-main {
      padding: 14px 36px;
      background: rgba(220,30,30,0.18); border: 1px solid rgba(220,30,30,0.7);
      color: #fff; font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      border-radius: 4px; text-decoration: none; backdrop-filter: blur(10px);
      transition: all 0.25s; display: inline-block;
    }
    .btn-main:hover { background: rgba(220,30,30,0.35); transform: translateY(-2px); }
    .btn-ghost {
      padding: 14px 36px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      border-radius: 4px; text-decoration: none; backdrop-filter: blur(10px);
      transition: all 0.25s; display: inline-block;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.12); color: #fff; transform: translateY(-2px); }

    /* Rest of your styles (kept same) */
    .section { padding: 4rem 2rem; background: #0a0a0a; }
    .section-alt { background: #0e0e0e; }
    .s-label { font-size: 9px; letter-spacing: 5px; color: #e53; margin-bottom: 6px; text-transform: uppercase; }
    .s-title { font-size: 28px; font-weight: 700; letter-spacing: 2px; margin-bottom: 1.5rem; }
    .divider { height: 1px; background: rgba(255,255,255,0.06); }
    .drop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .drop-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; overflow: hidden;
      transition: transform 0.25s, border-color 0.25s;
      text-decoration: none; color: #fff; display: block;
    }
    .drop-card:hover { transform: translateY(-5px); border-color: rgba(220,30,30,0.4); }
    .drop-img {
      aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
      font-size: 56px; background: #111; position: relative; overflow: hidden;
    }
    .drop-img img { width: 100%; height: 100%; object-fit: cover; }
    .d-badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 9px; letter-spacing: 1px; padding: 3px 8px; border-radius: 4px;
      background: rgba(220,30,30,0.3); color: #fca; border: 1px solid rgba(220,30,30,0.5);
    }
    .drop-info { padding: 14px; }
    .drop-info h3 { font-size: 14px; font-weight: 500; margin-bottom: 4px; letter-spacing: 1px; }
    .drop-info p { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 1px; }
    .cats { display: flex; gap: 10px; flex-wrap: wrap; }
    .cat-pill {
      padding: 10px 22px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 4px;
      font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.5);
      text-decoration: none; transition: all 0.2s; display: inline-block; text-transform: uppercase;
    }
    .cat-pill:hover { background: rgba(220,30,30,0.15); color: #fff; border-color: rgba(220,30,30,0.5); }
    .vault-banner {
      border-radius: 16px; padding: 3rem 2.5rem;
      display: flex; justify-content: space-between; align-items: center; gap: 2rem; flex-wrap: wrap;
      border: 1px solid rgba(255,255,255,0.08);
      background: #111; position: relative; overflow: hidden;
    }
    .vault-banner::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(220,30,30,0.1), transparent);
      pointer-events: none;
    }
    .vault-banner h2 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: 2px; }
    .vault-banner p { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.8; max-width: 420px; }
    .about-row { display: flex; gap: 2rem; align-items: center; flex-wrap: wrap; }
    .about-icon { font-size: 52px; flex-shrink: 0; }
    .about-text h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; letter-spacing: 1px; }
    .about-text p { font-size: 14px; color: rgba(255,255,255,0.4); line-height: 1.8; max-width: 500px; }
    footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5rem 2rem; background: #080808; border-top: 1px solid rgba(255,255,255,0.05);
    }
    footer p { font-size: 9px; color: rgba(255,255,255,0.18); letter-spacing: 3px; }

    @media (max-width: 600px) {
      nav { padding: 1rem 1.2rem; }
      .nav-links { gap: 14px; }
      .hero { padding: 5rem 1.5rem 3rem; }
      .logo-img { width: 220px; }
      .section { padding: 3rem 1.5rem; }
      .vault-banner { padding: 2rem 1.5rem; flex-direction: column; }
      footer { flex-direction: column; gap: 6px; text-align: center; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">DS</a>
    <div class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <div style="width:28px"></div>
  </nav>

  <!-- IMPROVED HERO -->
  <div class="hero">
    <div class="hero-bg-photo"></div>
    <div class="graffiti-tags">
      <span class="tag" style="font-size:220px;top:-60px;left:-40px;color:#e00;transform:rotate(-12deg)">DEAD</span>
      <span class="tag" style="font-size:160px;top:10px;right:-20px;color:#f60;transform:rotate(8deg)">STOCK</span>
      <span class="tag" style="font-size:130px;bottom:80px;left:5%;color:#0af;transform:rotate(-7deg)">DRIP</span>
      <span class="tag" style="font-size:115px;bottom:40px;right:8%;color:#c0f;transform:rotate(6deg)">VAULT</span>
      <span class="tag" style="font-size:95px;top:35%;left:22%;color:#fc0;transform:rotate(-5deg)">STEEZ</span>
      <span class="tag" style="font-size:85px;top:55%;right:15%;color:#e00;transform:rotate(9deg)">RARE</span>
    </div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="logo-wrap">
        <div class="logo-glow"></div>
        <img src="assets/logo.png" class="logo-img" alt="Dead Stock"
             onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block'">
        <h1 id="logo-text" style="display:none;font-size:68px;font-weight:900;letter-spacing:8px;margin-bottom:1rem;color:#fff;">DEAD<br>STOCK</h1>
      </div>
      <p class="hero-sub">CURATED THRIFT • SECOND LIFE STREETWEAR</p>
      <div class="hero-btns">
        <a href="shop.html" class="btn-main">ENTER THE VAULT</a>
        <a href="shop.html" class="btn-ghost">BROWSE DROPS</a>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Keep your existing sections below (Featured Drop, Categories, Vault Banner, About) -->
  <!-- ... (your original content from line ~250 onwards) ... -->

  <!-- MINI CART + JS (added at the end) -->
  <div id="miniCart" style="position:fixed;bottom:20px;right:20px;background:rgba(10,10,10,0.95);border:1px solid #e53;border-radius:12px;padding:16px;width:280px;display:none;z-index:1000;box-shadow:0 10px 30px rgba(229,51,51,0.3);">
    <h3 style="margin:0 0 12px 0;font-size:13px;letter-spacing:2px;">YOUR CART (<span id="cartCount">0</span>)</h3>
    <div id="cartItems" style="max-height:320px;overflow-y:auto;"></div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1);">
      <div style="display:flex;justify-content:space-between;font-weight:700;"><span>TOTAL</span><span id="cartTotal">₹0</span></div>
      <button onclick="checkout()" style="width:100%;margin-top:12px;padding:12px;background:#e53;color:#fff;border:none;border-radius:8px;font-size:11px;letter-spacing:2px;">CHECKOUT →</button>
    </div>
  </div>

  <script>
    // Cart System
    let cart = [];
    function addToCart(name, price, img = '') {
      cart.push({name, price, img});
      updateCart();
      showMiniCart();
    }
    function updateCart() {
      document.getElementById('cartCount').textContent = cart.length;
      document.getElementById('cartTotal').textContent = '₹' + cart.reduce((sum, item) => sum + item.price, 0);
      let html = '';
      cart.forEach((item, i) => {
        html += `<div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;font-size:13px;">
          <div>${item.name}</div>
          <div>₹${item.price} <span onclick="removeFromCart(${i})" style="color:#e53;cursor:pointer;margin-left:8px;">×</span></div>
        </div>`;
      });
      document.getElementById('cartItems').innerHTML = html || '<p style="color:#666;font-size:12px;">Cart empty</p>';
    }
    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCart();
    }
    function showMiniCart() {
      document.getElementById('miniCart').style.display = 'block';
    }
    function checkout() {
      if (cart.length === 0) return;
      alert("🔥 Thank you! This is a demo — real checkout (Razorpay) coming soon.\n\nTotal: ₹" + cart.reduce((sum, item) => sum + item.price, 0));
      cart = [];
      updateCart();
    }

    // Attach to all Add to Cart buttons (works on both pages)
    document.querySelectorAll('.add-btn').forEach(btn => {
      if (btn.disabled) return;
      btn.addEventListener('click', () => {
        const card = btn.closest('.product-card') || btn.closest('.drop-card');
        if (!card) return;
        const nameEl = card.querySelector('.product-name, h3');
        const priceEl = card.querySelector('.product-price');
        if (!nameEl || !priceEl) return;
        const name = nameEl.textContent.trim();
        const priceText = priceEl.textContent;
        const price = parseInt(priceText.replace('₹', '').replace(',', '')) || 999;
        addToCart(name, price);
        btn.textContent = '✓ ADDED';
        setTimeout(() => btn.textContent = 'ADD TO CART', 1200);
      });
    });

    // Fade in on scroll
    document.addEventListener('scroll', () => {
      document.querySelectorAll('.drop-card, .product-card').forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight * 0.85) el.style.opacity = '1';
      });
    });
  </script>
</body>
</html>

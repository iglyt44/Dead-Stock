<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dead Stock Vault - Rare thrift streetwear" />
  <title>THE VAULT | DEAD STOCK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.1rem 2rem; background: rgba(0,0,0,0.9);
      border-bottom: 1px solid #e53;
    }
    .nav-logo { font-size: 19px; font-weight: 900; letter-spacing: 5px; color: #e53; text-decoration: none; }
    .nav-links { display: flex; gap: 26px; }
    .nav-links a { color: #ccc; text-decoration: none; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }

    .search-container {
      background: rgba(255,255,255,0.07); border: 1px solid #444; border-radius: 30px;
      padding: 8px 16px; display: flex; align-items: center; width: 320px;
    }
    .search-container input {
      background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 14px;
    }

    /* Main Content */
    .shop-hero { padding-top: 110px; text-align: center; padding-bottom: 3rem; background: linear-gradient(#1a1212, #0a0a0a); }
    .shop-hero h1 { font-size: 46px; font-weight: 900; letter-spacing: 8px; }
    .shop-hero p { font-size: 12px; letter-spacing: 4px; color: rgba(255,255,255,0.5); }

    .filters { display: flex; justify-content: center; gap: 14px; flex-wrap: wrap; padding: 1.8rem 2rem; background: #111; }
    .filter-btn {
      padding: 10px 24px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: #ccc; font-size: 11px; letter-spacing: 2px; border-radius: 6px; cursor: pointer;
    }
    .filter-btn.active, .filter-btn:hover { background: rgba(229,51,51,0.25); border-color: #e53; color: #fff; }

    .products-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px;
      padding: 4rem 2rem; max-width: 1600px; margin: 0 auto;
    }
    .product-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.3s;
    }
    .product-card:hover { transform: translateY(-10px); border-color: #e53; }
    .product-img { height: 280px; background: #111; overflow: hidden; position: relative; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .badge { position: absolute; top: 14px; right: 14px; background: #e53; color: #fff; padding: 5px 12px; font-size: 10px; border-radius: 4px; }
    .product-info { padding: 18px; }
    .product-name { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .product-price { font-size: 19px; font-weight: 700; color: #e53; }

    /* PROFESSIONAL CART DRAWER */
    #cartDrawer {
      position: fixed; top: 0; right: -420px; width: 420px; height: 100%;
      background: #111; border-left: 2px solid #e53; z-index: 3000;
      transition: right 0.4s ease; box-shadow: -10px 0 30px rgba(0,0,0,0.8);
      overflow-y: auto;
    }
    #cartDrawer.open { right: 0; }
    .cart-header {
      padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;
    }
    .cart-item {
      display: flex; gap: 15px; padding: 18px; border-bottom: 1px solid #222;
    }
    .cart-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; }
    .cart-total {
      padding: 20px; font-size: 18px; font-weight: 700; border-top: 1px solid #333;
    }

    /* MODAL */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
    .modal-content { background: #111; max-width: 650px; width: 94%; border-radius: 12px; border: 1px solid #e53; padding: 25px; max-height: 90vh; overflow-y: auto; }

    footer { padding: 3rem 2rem; background: #080808; text-align: center; font-size: 10px; color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">DEAD STOCK</a>
    <div class="nav-links">
      <a href="index.html">HOME</a>
      <a href="shop.html" class="active">SHOP</a>
      <a href="about.html">ABOUT</a>
      <a href="contact.html">CONTACT</a>
    </div>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search jackets, watches..." onkeyup="if(event.key==='Enter') searchProducts()">
      <button onclick="searchProducts()">🔍</button>
    </div>
    <div style="display:flex; gap:15px; align-items:center;">
      <a href="#" onclick="toggleCartDrawer(); return false;" style="font-size:24px; position:relative; color:#fff;">
        🛒 <span id="navCartCount" style="position:absolute;top:-6px;right:-8px;background:#e53;color:#000;font-size:11px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;">0</span>
      </a>
      <a href="signup.html" style="padding:8px 18px;background:rgba(255,255,255,0.08);border:1px solid #e53;color:#fff;text-decoration:none;border-radius:6px;font-size:12px;">SIGN UP</a>
      <a href="login.html" style="padding:8px 18px;background:#e53;color:#000;text-decoration:none;border-radius:6px;font-size:12px;font-weight:bold;">LOGIN</a>
    </div>
  </nav>

  <!-- HERO -->
  <div class="shop-hero">
    <h1>THE VAULT</h1>
    <p>CURATED THRIFT • RARE STREET FINDS</p>
  </div>

  <!-- FILTERS & PRODUCTS GRID -->
  <div class="filters"> ... (same as before) ... </div>
  <div class="products-grid" id="productsGrid"></div>

  <!-- PROFESSIONAL CART DRAWER -->
  <div id="cartDrawer">
    <div class="cart-header">
      <h2>Your Cart (<span id="drawerCartCount">0</span>)</h2>
      <span onclick="toggleCartDrawer()" style="font-size:28px;cursor:pointer;color:#e53;">×</span>
    </div>
    <div id="drawerCartItems" style="padding:10px;"></div>
    <div class="cart-total">
      TOTAL: <span id="drawerTotal">₹0</span>
      <button onclick="checkout()" style="width:100%;margin-top:15px;padding:16px;background:#e53;color:#000;border:none;border-radius:8px;font-size:15px;font-weight:bold;">PROCEED TO CHECKOUT</button>
    </div>
  </div>

  <!-- Rest of your modal code remains same -->
  <!-- ... (Product Modal code) ... -->

  <script>
    let products = JSON.parse(localStorage.getItem('deadstock_products')) || [];
    let cart = JSON.parse(localStorage.getItem('deadstock_cart')) || [];

    // Render Products (same as before)
    function renderProducts(filtered = products) { ... }   // Keep your existing renderProducts function

    function toggleCartDrawer() {
      const drawer = document.getElementById('cartDrawer');
      drawer.classList.toggle('open');
      renderDrawerCart();
    }

    function renderDrawerCart() {
      const container = document.getElementById('drawerCartItems');
      container.innerHTML = '';
      let total = 0;

      if (cart.length === 0) {
        container.innerHTML = `<p style="text-align:center;padding:40px;color:#666;">Your cart is empty</p>`;
        return;
      }

      cart.forEach((item, index) => {
        total += item.price;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <img src="${item.imageData || ''}" onerror="this.style.display='none'">
          <div style="flex:1;">
            <div>${item.name}</div>
            <div style="color:#e53;">₹${item.price}</div>
          </div>
          <button onclick="removeFromCart(${index});" style="background:none;border:none;color:#e53;font-size:20px;cursor:pointer;">×</button>
        `;
        container.appendChild(div);
      });

      document.getElementById('drawerTotal').textContent = `₹${total}`;
      document.getElementById('drawerCartCount').textContent = cart.length;
      document.getElementById('navCartCount').textContent = cart.length;
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      localStorage.setItem('deadstock_cart', JSON.stringify(cart));
      renderDrawerCart();
    }

    function checkout() {
      if (cart.length === 0) return;
      alert(`Thank you for shopping at Dead Stock!\n\nTotal Amount: ₹${cart.reduce((sum, item) => sum + item.price, 0)}\n\n(This is a demo - Real checkout coming soon)`);
      cart = [];
      localStorage.setItem('deadstock_cart', JSON.stringify(cart));
      toggleCartDrawer();
    }

    // Initialize
    window.onload = () => {
      renderProducts();
    };
  </script>
</body>
</html>

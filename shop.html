<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dead Stock Vault - Rare thrift streetwear, vintage jackets, watches & accessories" />
  <title>THE VAULT | DEAD STOCK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* NAV - Gritty Style */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 2rem; background: rgba(10,10,10,0.95);
      border-bottom: 1px solid #e53; backdrop-filter: blur(10px);
    }
    .nav-logo {
      font-size: 22px; font-weight: 900; letter-spacing: 6px;
      color: #e53; text-decoration: none; text-transform: uppercase;
    }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a {
      color: #ccc; text-decoration: none; font-size: 12px;
      letter-spacing: 3px; text-transform: uppercase; font-weight: 600;
    }
    .nav-links a:hover, .nav-links a.active { color: #fff; }

    .search-container {
      background: rgba(255,255,255,0.06); border: 1px solid #444;
      border-radius: 30px; padding: 8px 16px; display: flex; align-items: center;
      width: 320px;
    }
    .search-container input {
      background: transparent; border: none; color: #fff; width: 100%;
      outline: none; font-size: 14px;
    }

    /* HERO */
    .shop-hero {
      padding-top: 110px; background: linear-gradient(#1a1212, #0a0a0a);
      text-align: center; padding-bottom: 4rem; position: relative;
    }
    .shop-hero h1 {
      font-size: 52px; font-weight: 900; letter-spacing: 10px;
      color: #fff; text-transform: uppercase;
    }
    .shop-hero p {
      font-size: 13px; letter-spacing: 5px; color: rgba(255,255,255,0.45);
      text-transform: uppercase; margin-top: 10px;
    }

    /* FILTERS */
    .filters {
      display: flex; justify-content: center; gap: 14px; flex-wrap: wrap;
      padding: 2rem 2rem; background: #111; border-bottom: 1px solid rgba(229,51,51,0.2);
    }
    .filter-btn {
      padding: 11px 26px; background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); color: #ccc;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      border-radius: 6px; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: rgba(229,51,51,0.25); border-color: #e53; color: #fff;
    }

    /* PRODUCTS */
    .products-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 26px; padding: 4rem 2rem; max-width: 1600px; margin: 0 auto;
    }
    .product-card {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; overflow: hidden; cursor: pointer;
      transition: all 0.3s;
    }
    .product-card:hover {
      transform: translateY(-12px); border-color: #e53;
      box-shadow: 0 20px 40px rgba(229,51,51,0.15);
    }
    .product-img {
      height: 290px; background: #111; position: relative; overflow: hidden;
    }
    .product-img img {
      width: 100%; height: 100%; object-fit: cover; transition: 0.5s;
    }
    .product-card:hover img { transform: scale(1.1); }
    .badge {
      position: absolute; top: 16px; right: 16px; font-size: 10px;
      padding: 6px 14px; background: rgba(229,51,51,0.9);
      color: #fff; border-radius: 4px; letter-spacing: 1px;
    }
    .product-info { padding: 18px; }
    .product-name {
      font-size: 16px; font-weight: 700; letter-spacing: 1px;
      margin-bottom: 6px; text-transform: uppercase;
    }
    .product-price {
      font-size: 20px; font-weight: 800; color: #e53;
    }

    /* CART DRAWER */
    #cartDrawer {
      position: fixed; top: 0; right: -440px; width: 440px; height: 100%;
      background: #0f0f0f; border-left: 2px solid #e53; z-index: 3000;
      transition: right 0.4s ease; box-shadow: -15px 0 40px rgba(0,0,0,0.9);
    }
    #cartDrawer.open { right: 0; }
    .cart-header {
      padding: 20px 25px; border-bottom: 1px solid #333;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 18px; font-weight: 700;
    }
    .cart-item {
      display: flex; gap: 15px; padding: 18px 25px; border-bottom: 1px solid #222;
    }
    .cart-item img { width: 85px; height: 85px; object-fit: cover; border-radius: 8px; }
    .cart-total {
      padding: 25px; font-size: 19px; font-weight: 700;
      border-top: 1px solid #333;
    }

    /* MODAL */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.96); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal-content {
      background: #111; max-width: 680px; width: 94%; border-radius: 12px;
      border: 1px solid #e53; padding: 25px; max-height: 90vh; overflow-y: auto;
    }
    .close { float: right; font-size: 38px; cursor: pointer; color: #e53; }

    footer {
      padding: 3rem 2rem; background: #080808; text-align: center;
      font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 3px;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">DEAD STOCK</a>
    <div class="nav-links">
      <a href="index.html">HOME</a>
      <a href="shop.html" class="active">THE VAULT</a>
      <a href="about.html">STORY</a>
      <a href="contact.html">CONTACT</a>
    </div>
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Search drip... jackets, watches" onkeyup="if(event.key==='Enter') searchProducts()">
      <button onclick="searchProducts()">🔍</button>
    </div>
    <div style="display:flex; gap:16px; align-items:center;">
      <a href="#" onclick="toggleCartDrawer(); return false;" style="font-size:26px;position:relative;color:#fff;">
        🛒
        <span id="navCartCount" style="position:absolute;top:-8px;right:-8px;background:#e53;color:#000;font-size:11px;width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;">0</span>
      </a>
      <a href="signup.html" style="padding:9px 18px;background:rgba(255,255,255,0.08);border:1px solid #e53;color:#fff;text-decoration:none;border-radius:6px;font-size:12px;">SIGN UP</a>
      <a href="login.html" style="padding:9px 18px;background:#e53;color:#000;text-decoration:none;border-radius:6px;font-size:12px;font-weight:bold;">LOGIN</a>
    </div>
  </nav>

  <!-- SHOP HERO -->
  <div class="shop-hero">
    <h1>THE VAULT</h1>
    <p>CURATED THRIFT • UNDERGROUND DRIP • SECOND LIFE</p>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <div class="filter-btn active" onclick="filterCategory('all')">ALL</div>
    <div class="filter-btn" onclick="filterCategory('clothing')">CLOTHING</div>
    <div class="filter-btn" onclick="filterCategory('watch')">WATCHES</div>
    <div class="filter-btn" onclick="filterCategory('ring')">RINGS</div>
    <div class="filter-btn" onclick="filterCategory('belt')">BELTS</div>
    <div class="filter-btn" onclick="filterCategory('accessory')">ACCESSORIES</div>
  </div>

  <!-- PRODUCTS -->
  <div class="products-grid" id="productsGrid"></div>

  <!-- CART DRAWER -->
  <div id="cartDrawer">
    <div class="cart-header">
      <h2>CART (<span id="drawerCartCount">0</span>)</h2>
      <span onclick="toggleCartDrawer()" style="cursor:pointer;font-size:32px;color:#e53;">×</span>
    </div>
    <div id="drawerCartItems"></div>
    <div class="cart-total">
      TOTAL: <span id="drawerTotal">₹0</span>
      <button onclick="checkout()" style="width:100%;margin-top:20px;padding:16px;background:#e53;color:#000;border:none;border-radius:8px;font-weight:bold;font-size:15px;">CHECKOUT</button>
    </div>
  </div>

  <!-- PRODUCT MODAL -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <div id="modalImage" style="text-align:center;margin:20px 0;"></div>
      <h2 id="modalName" style="font-size:26px;letter-spacing:2px;"></h2>
      <div id="modalPrice" style="font-size:24px;font-weight:800;color:#e53;margin:10px 0;"></div>
      <div id="modalDesc" style="color:#bbb;line-height:1.8;margin:20px 0;"></div>
      
      <h3 style="margin:25px 0 12px 0;">Reviews</h3>
      <div id="reviewsList" style="max-height:280px;overflow-y:auto;background:#1a1a1a;padding:15px;border-radius:8px;"></div>
      
      <textarea id="newReview" placeholder="Drop your thoughts..." style="width:100%;margin-top:20px;padding:14px;background:#1a1a1a;color:#fff;border:1px solid #444;border-radius:8px;min-height:100px;"></textarea>
      <button onclick="submitReview()" style="margin-top:12px;padding:14px 30px;background:#e53;color:#000;border:none;border-radius:8px;font-weight:bold;">POST REVIEW</button>
    </div>
  </div>

  <footer>DEAD STOCK © 2026 • UNDERGROUND THRIFT • MADE WITH GRIT</footer>

  <script>
    let products = JSON.parse(localStorage.getItem('deadstock_products')) || [];
    let cart = JSON.parse(localStorage.getItem('deadstock_cart')) || [];
    let currentProduct = null;

    function renderProducts(filtered = products) {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '';

      const active = filtered.filter(p => p.status === 'active');
      if (active.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;padding:100px 20px;color:#666;">No pieces found in this drop.</p>`;
        return;
      }

      active.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="product-img">
            ${product.imageData ? `<img src="${product.imageData}" alt="${product.name}">` : `<span style="font-size:120px">🛍️</span>`}
            ${product.badge ? `<div class="badge">${product.badge}</div>` : ''}
          </div>
          <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-price">₹${product.price}</div>
            <button class="add-btn" onclick="event.stopImmediatePropagation(); addToCart(${product.id});">ADD TO CART</button>
          </div>
        `;
        card.onclick = () => showProductDetails(product);
        grid.appendChild(card);
      });
    }

    function filterCategory(cat) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');
      
      if (cat === 'all') renderProducts(products);
      else renderProducts(products.filter(p => p.category === cat));
    }

    function searchProducts() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!q) return renderProducts();
      const filtered = products.filter(p => 
        p.name.toLowerCase().includes(q) || 
        (p.description && p.description.toLowerCase().includes(q))
      );
      renderProducts(filtered);
    }

    function addToCart(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;
      cart.push(product);
      localStorage.setItem('deadstock_cart', JSON.stringify(cart));
      updateNavCartCount();
      alert(`${product.name} added to cart 🔥`);
    }

    function updateNavCartCount() {
      document.getElementById('navCartCount').textContent = cart.length;
    }

    function toggleCartDrawer() {
      const drawer = document.getElementById('cartDrawer');
      drawer.classList.toggle('open');
      renderDrawerCart();
    }

    function renderDrawerCart() {
      const container = document.getElementById('drawerCartItems');
      container.innerHTML = '';
      let total = 0;

      if (cart.length === 0) {
        container.innerHTML = `<p style="text-align:center;padding:60px;color:#666;">Cart empty</p>`;
        return;
      }

      cart.forEach((item, i) => {
        total += item.price;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <img src="${item.imageData}" onerror="this.style.display='none'">
          <div style="flex:1">
            <div style="font-weight:600;">${item.name}</div>
            <div style="color:#e53;margin-top:4px;">₹${item.price}</div>
          </div>
          <button onclick="removeFromCart(${i});" style="background:none;border:none;color:#e53;font-size:24px;cursor:pointer;">×</button>
        `;
        container.appendChild(div);
      });

      document.getElementById('drawerTotal').textContent = `₹${total}`;
      document.getElementById('drawerCartCount').textContent = cart.length;
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      localStorage.setItem('deadstock_cart', JSON.stringify(cart));
      renderDrawerCart();
      updateNavCartCount();
    }

    function checkout() {
      if (cart.length === 0) return;
      alert(`Thank you for shopping at Dead Stock!\n\nTotal: ₹${cart.reduce((a,c)=>a+c.price,0)}\n\nReal checkout coming soon.`);
      cart = [];
      localStorage.setItem('deadstock_cart', JSON.stringify(cart));
      toggleCartDrawer();
    }

    // Product Modal
    function showProductDetails(product) {
      currentProduct = product;
      document.getElementById('modalName').textContent = product.name;
      document.getElementById('modalPrice').textContent = `₹${product.price}`;
      document.getElementById('modalDesc').textContent = product.description || "Handpicked rare vintage piece from the streets.";
      document.getElementById('modalImage').innerHTML = product.imageData 
        ? `<img src="${product.imageData}" style="max-width:100%;border-radius:12px;">` 
        : `<span style="font-size:160px">🛍️</span>`;
      renderReviews();
      document.getElementById('productModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('productModal').style.display = 'none'; }

    function renderReviews() {
      const container = document.getElementById('reviewsList');
      container.innerHTML = '';
      const reviews = currentProduct.reviews || [];
      if (reviews.length === 0) {
        container.innerHTML = `<p style="color:#666;text-align:center;padding:30px;">No reviews yet. Be the first.</p>`;
        return;
      }
      reviews.forEach(r => {
        const div = document.createElement('div');
        div.style = "background:#1a1a1a;padding:14px;border-radius:8px;margin-bottom:12px;";
        div.innerHTML = `<strong>${r.name||'Street User'}</strong><br><small>${r.text}</small>`;
        container.appendChild(div);
      });
    }

    function submitReview() {
      const text = document.getElementById('newReview').value.trim();
      if (!text) return;
      if (!currentProduct.reviews) currentProduct.reviews = [];
      currentProduct.reviews.push({name: "Customer", text});
      
      let all = JSON.parse(localStorage.getItem('deadstock_products')) || [];
      const idx = all.findIndex(p => p.id === currentProduct.id);
      if (idx !== -1) all[idx] = currentProduct;
      localStorage.setItem('deadstock_products', JSON.stringify(all));
      
      renderReviews();
      document.getElementById('newReview').value = '';
    }

    // Init
    window.onload = () => {
      renderProducts();
      updateNavCartCount();
    };
  </script>
</body>
</html>

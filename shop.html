<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ... your existing head and styles ... -->
  <style>
    /* Add this to your existing styles */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal-content {
      background: #111; max-width: 600px; width: 90%; border-radius: 12px;
      border: 1px solid #e53; padding: 20px; max-height: 90vh; overflow-y: auto;
    }
    .close { float: right; font-size: 28px; cursor: pointer; color: #e53; }
  </style>
</head>
<body>
  <!-- ... your nav, hero, filters, products-grid ... -->

  <!-- Product Detail Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <div id="modalImage" style="text-align:center;margin:15px 0;"></div>
      <h2 id="modalName" style="margin:10px 0;"></h2>
      <div id="modalPrice" style="font-size:22px;font-weight:700;color:#e53;margin:8px 0;"></div>
      <div id="modalDesc" style="color:#ccc;line-height:1.6;margin:15px 0;"></div>
      
      <h3 style="margin:20px 0 10px;">Reviews</h3>
      <div id="reviewsList" style="max-height:300px;overflow-y:auto;"></div>
      
      <textarea id="newReview" placeholder="Write your review..." style="width:100%;margin-top:15px;padding:10px;background:#222;color:#fff;border:1px solid #444;border-radius:6px;"></textarea>
      <button onclick="submitReview()" style="margin-top:8px;padding:10px 20px;background:#e53;color:#000;border:none;border-radius:6px;">Post Review</button>
    </div>
  </div>

  <script>
    // ... your existing cart code ...

    let currentProductId = null;

    function showProductDetails(product) {
      currentProductId = product.id;
      document.getElementById('modalName').textContent = product.name;
      document.getElementById('modalPrice').textContent = `₹${product.price}`;
      document.getElementById('modalDesc').textContent = product.description || "No description added yet.";
      
      const imgDiv = document.getElementById('modalImage');
      imgDiv.innerHTML = product.imageData 
        ? `<img src="${product.imageData}" style="max-width:100%;border-radius:8px;">` 
        : `<span style="font-size:120px">⌚</span>`;

      renderReviews(product);
      document.getElementById('productModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('productModal').style.display = 'none';
    }

    function renderReviews(product) {
      const container = document.getElementById('reviewsList');
      container.innerHTML = '';
      const reviews = product.reviews || [];
      
      if (reviews.length === 0) {
        container.innerHTML = '<p style="color:#666;">No reviews yet. Be the first!</p>';
        return;
      }
      
      reviews.forEach(r => {
        const div = document.createElement('div');
        div.style = "background:#1a1a1a;padding:12px;border-radius:8px;margin-bottom:10px;";
        div.innerHTML = `<strong>${r.name || 'Anonymous'}</strong><br><small>${r.text}</small>`;
        container.appendChild(div);
      });
    }

    function submitReview() {
      const text = document.getElementById('newReview').value.trim();
      if (!text || !currentProductId) return;

      let products = JSON.parse(localStorage.getItem('deadstock_products')) || [];
      const product = products.find(p => p.id === currentProductId);
      
      if (product) {
        if (!product.reviews) product.reviews = [];
        product.reviews.push({ name: "User", text: text, date: new Date().toLocaleDateString() });
        localStorage.setItem('deadstock_products', JSON.stringify(products));
        
        renderReviews(product);
        document.getElementById('newReview').value = '';
        alert("✅ Review posted!");
      }
    }

    // Make cards clickable
    function attachCardClick() {
      document.querySelectorAll('.product-card').forEach(card => {
        card.style.cursor = 'pointer';
        card.addEventListener('click', (e) => {
          if (e.target.classList.contains('add-btn')) return; // don't open modal when clicking add to cart
          const name = card.querySelector('.product-name').textContent;
          const products = JSON.parse(localStorage.getItem('deadstock_products')) || [];
          const product = products.find(p => p.name === name);
          if (product) showProductDetails(product);
        });
      });
    }

    // Update your renderProducts to call attachCardClick after rendering
    // Add at the end of renderProducts():
    setTimeout(attachCardClick, 100);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dead Stock Vault - Shop rare thrift streetwear" />
  <title>THE VAULT | DEAD STOCK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 2rem;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .nav-logo { font-size: 14px; font-weight: 700; letter-spacing: 4px; color: rgba(255,255,255,0.7); text-decoration: none; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }

    .hero-shop { padding-top: 90px; background: linear-gradient(#1a1212, #0a0a0a); text-align: center; padding-bottom: 3rem; }
    .hero-shop h1 { font-size: 42px; font-weight: 900; letter-spacing: 6px; }
    .hero-shop p { font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.4); }

    .filters {
      display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
      padding: 1.5rem 2rem; background: #111; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .filter-btn {
      padding: 8px 20px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      border-radius: 4px; cursor: pointer;
    }
    .filter-btn.active, .filter-btn:hover { background: rgba(220,30,30,0.2); border-color: #e53; color: #fff; }

    .products-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px;
      padding: 3rem 2rem; max-width: 1400px; margin: 0 auto;
    }
    .product-card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; overflow: hidden; transition: all 0.25s; cursor: pointer;
    }
    .product-card:hover { transform: translateY(-8px); border-color: rgba(220,30,30,0.5); }
    .product-img { height: 260px; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .badge { position: absolute; top: 12px; right: 12px; font-size: 9px; padding: 4px 10px; border-radius: 4px; background: rgba(220,30,30,0.9); }
    .product-info { padding: 16px; }
    .product-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .product-price { font-size: 17px; font-weight: 700; color: #e53; }
    .add-btn {
      margin-top: 10px; width: 100%; padding: 12px; background: transparent; border: 1px solid #e53;
      color: #fff; font-size: 10px; letter-spacing: 3px; cursor: pointer;
    }
    .add-btn:hover { background: #e53; color: #000; }

    /* Modal */
    .modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal-content {
      background: #111; max-width: 620px; width: 92%; border-radius: 12px;
      border: 1px solid #e53; padding: 20px; max-height: 92vh; overflow-y: auto;
    }
    .close { float: right; font-size: 32px; cursor: pointer; color: #e53; }

    footer { padding: 2rem; background: #080808; text-align: center; font-size: 9px; color: rgba(255,255,255,0.18); }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">DS</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html" class="active">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <div class="hero-shop">
    <h1>THE VAULT</h1>
    <p>CURATED THRIFT • RARE DROPS • SECOND LIFE DRIP</p>
  </div>

  <div class="filters">
    <div class="filter-btn active" onclick="filterCategory('all')">ALL</div>
    <div class="filter-btn" onclick="filterCategory('clothing')">CLOTHING</div>
    <div class="filter-btn" onclick="filterCategory('watch')">WATCHES</div>
    <div class="filter-btn" onclick="filterCategory('ring')">RINGS</div>
    <div class="filter-btn" onclick="filterCategory('belt')">BELTS</div>
    <div class="filter-btn" onclick="filterCategory('accessory')">ACCESSORIES</div>
  </div>

  <div class="products-grid" id="productsGrid"></div>

  <!-- MINI CART -->
  <div id="miniCart" style="position:fixed;bottom:20px;right:20px;background:rgba(10,10,10,0.95);border:1px solid #e53;border-radius:12px;padding:16px;width:280px;display:none;z-index:1000;box-shadow:0 10px 30px rgba(229,51,51,0.3);">
    <h3 style="margin:0 0 12px 0;font-size:13px;letter-spacing:2px;">YOUR CART (<span id="cartCount">0</span>)</h3>
    <div id="cartItems" style="max-height:320px;overflow-y:auto;"></div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1);">
      <div style="display:flex;justify-content:space-between;font-weight:700;"><span>TOTAL</span><span id="cartTotal">₹0</span></div>
      <button onclick="checkout()" style="width:100%;margin-top:12px;padding:12px;background:#e53;color:#fff;border:none;border-radius:8px;font-size:11px;letter-spacing:2px;">CHECKOUT →</button>
    </div>
  </div>

  <!-- PRODUCT DETAIL MODAL -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">×</span>
      <div id="modalImage" style="text-align:center;margin:15px 0;"></div>
      <h2 id="modalName"></h2>
      <div id="modalPrice" style="font-size:22px;font-weight:700;color:#e53;margin:8px 0;"></div>
      <div id="modalDesc" style="color:#ccc;line-height:1.6;margin:15px 0;white-space:pre-wrap;"></div>
      
      <h3 style="margin:25px 0 10px 0;">Reviews</h3>
      <div id="reviewsList" style="max-height:280px;overflow-y:auto;background:#1a1a1a;padding:10px;border-radius:8px;"></div>
      
      <textarea id="newReview" placeholder="Write your honest review here..." style="width:100%;margin-top:15px;padding:12px;background:#222;color:#fff;border:1px solid #444;border-radius:6px;min-height:80px;"></textarea>
      <button onclick="submitReview()" style="margin-top:8px;padding:12px 24px;background:#e53;color:#000;border:none;border-radius:6px;font-weight:bold;">POST REVIEW</button>
    </div>
  </div>

  <footer>DEAD STOCK © 2026 • ALL RIGHTS RESERVED • MADE WITH GRIT</footer>

  <script>
    let products = JSON.parse(localStorage.getItem('deadstock_products')) || [];
    let cart = [];

    function renderProducts(filtered = products) {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '';

      const activeProducts = filtered.filter(p => p.status === 'active');

      if (activeProducts.length === 0) {
        grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#666;padding:60px 20px;">No products available yet.<br><small>Check back for new drops 🔥</small></p>`;
        return;
      }

      activeProducts.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="product-img">
            ${product.imageData ? `<img src="${product.imageData}" alt="${product.name}">` : `<span style="font-size:100px">⌚</span>`}
            ${product.badge ? `<div class="badge">${product.badge}</div>` : ''}
          </div>
          <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-price">₹${product.price}</div>
            <button class="add-btn" onclick="event.stopImmediatePropagation(); addToCart(${product.id})">ADD TO CART</button>
          </div>
        `;
        card.onclick = () => showProductDetails(product);
        grid.appendChild(card);
      });
    }

    // Filter
    window.filterCategory = function(cat) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');

      if (cat === 'all') renderProducts(products);
      else renderProducts(products.filter(p => p.category === cat));
    };

    // Cart Functions
    function addToCart(id) {
      const product = products.find(p => p.id === id);
      if (!product) return;
      cart.push(product);
      updateCart();
      showMiniCart();
    }

    function updateCart() {
      document.getElementById('cartCount').textContent = cart.length;
      document.getElementById('cartTotal').textContent = '₹' + cart.reduce((sum, item) => sum + item.price, 0);
      // ... (full cart items HTML) ...
    }

    function showMiniCart() { document.getElementById('miniCart').style.display = 'block'; }
    function checkout() {
      if (cart.length === 0) return;
      alert("🔥 Thank you! Demo checkout.\nTotal: ₹" + cart.reduce((s, i) => s + i.price, 0));
      cart = [];
      updateCart();
    }

    // Modal Functions
    let currentProduct = null;

    function showProductDetails(product) {
      currentProduct = product;
      document.getElementById('modalName').textContent = product.name;
      document.getElementById('modalPrice').textContent = `₹${product.price}`;
      document.getElementById('modalDesc').textContent = product.description || "Rare curated thrift piece. More details coming soon.";
      
      document.getElementById('modalImage').innerHTML = product.imageData 
        ? `<img src="${product.imageData}" style="max-width:100%;border-radius:10px;">` 
        : `<span style="font-size:140px">⌚</span>`;

      renderReviews();
      document.getElementById('productModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('productModal').style.display = 'none';
    }

    function renderReviews() {
      const container = document.getElementById('reviewsList');
      container.innerHTML = '';
      const reviews = currentProduct.reviews || [];
      
      if (reviews.length === 0) {
        container.innerHTML = '<p style="color:#666;text-align:center;">No reviews yet. Be the first to review!</p>';
        return;
      }
      
      reviews.forEach(r => {
        const div = document.createElement('div');
        div.style = "background:#1a1a1a;padding:12px;border-radius:8px;margin-bottom:10px;";
        div.innerHTML = `<strong>${r.name || 'Anonymous'}</strong><br><small>${r.text}</small>`;
        container.appendChild(div);
      });
    }

    function submitReview() {
      const text = document.getElementById('newReview').value.trim();
      if (!text || !currentProduct) return;

      if (!currentProduct.reviews) currentProduct.reviews = [];
      currentProduct.reviews.push({ name: "Customer", text: text });

      // Save to localStorage
      let allProducts = JSON.parse(localStorage.getItem('deadstock_products')) || [];
      const index = allProducts.findIndex(p => p.id === currentProduct.id);
      if (index !== -1) allProducts[index] = currentProduct;
      localStorage.setItem('deadstock_products', JSON.stringify(allProducts));

      renderReviews();
      document.getElementById('newReview').value = '';
      alert("✅ Review posted! Thank you.");
    }

    // Initialize
    window.onload = () => {
      renderProducts();
    };
  </script>
</body>
</html>

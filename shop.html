<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dead Stock Vault - Shop rare thrift streetwear, vintage jackets, watches, rings, belts & accessories." />
  <title>THE VAULT | DEAD STOCK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* NAV - same as index */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 2rem;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .nav-logo { font-size: 14px; font-weight: 700; letter-spacing: 4px; color: rgba(255,255,255,0.7); text-decoration: none; }
    .nav-links { display: flex; gap: 28px; }
    .nav-links a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }

    .hero-shop {
      padding-top: 90px;
      background: linear-gradient(#1a1212, #0a0a0a);
      text-align: center;
      padding-bottom: 3rem;
    }
    .hero-shop h1 {
      font-size: 42px; font-weight: 900; letter-spacing: 6px;
      margin-bottom: 8px; color: #fff;
    }
    .hero-shop p { font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.4); text-transform: uppercase; }

    .filters {
      display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;
      padding: 1.5rem 2rem; background: #111; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .filter-btn {
      padding: 8px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      border-radius: 4px; cursor: pointer; transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: rgba(220,30,30,0.2);
      border-color: #e53;
      color: #fff;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      padding: 3rem 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .product-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.25s;
      color: #fff;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-8px);
      border-color: rgba(220,30,30,0.5);
      box-shadow: 0 15px 30px rgba(0,0,0,0.6);
    }
    .product-img {
      height: 260px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      position: relative;
      overflow: hidden;
    }
    .product-img img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .badge {
      position: absolute; top: 12px; right: 12px;
      font-size: 9px; padding: 4px 10px; border-radius: 4px;
      background: rgba(220,30,30,0.9); color: #fff;
      letter-spacing: 1px;
    }
    .sold {
      background: rgba(100,100,100,0.9);
    }
    .product-info {
      padding: 16px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }
    .product-name {
      font-size: 15px; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.5px;
    }
    .product-desc {
      font-size: 12px; color: rgba(255,255,255,0.45); margin-bottom: 12px; flex-grow: 1;
    }
    .product-price {
      font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 12px;
    }
    .add-btn {
      margin-top: auto;
      padding: 12px;
      background: transparent;
      border: 1px solid #e53;
      color: #fff;
      font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .add-btn:hover {
      background: #e53;
      color: #000;
    }
    .add-btn:disabled {
      opacity: 0.4; cursor: not-allowed;
    }

    /* MINI CART */
    #miniCart {
      position:fixed; bottom:20px; right:20px; background:rgba(10,10,10,0.95);
      border:1px solid #e53; border-radius:12px; padding:16px; width:280px;
      display:none; z-index:1000; box-shadow:0 10px 30px rgba(229,51,51,0.3);
    }

    footer {
      padding: 2rem; background: #080808; text-align: center;
      font-size: 9px; color: rgba(255,255,255,0.18); letter-spacing: 3px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    @media (max-width: 600px) {
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; padding: 2rem 1rem; }
      .product-img { height: 200px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">DS</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="shop.html" class="active">Shop</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
    <div style="width:28px"></div>
  </nav>

  <div class="hero-shop">
    <h1>THE VAULT</h1>
    <p>CURATED THRIFT • RARE DROPS • SECOND LIFE DRIP</p>
  </div>

  <div class="filters">
    <div class="filter-btn active" onclick="filterCategory('all')">ALL</div>
    <div class="filter-btn" onclick="filterCategory('clothing')">CLOTHING</div>
    <div class="filter-btn" onclick="filterCategory('watch')">WATCHES</div>
    <div class="filter-btn" onclick="filterCategory('ring')">RINGS</div>
    <div class="filter-btn" onclick="filterCategory('belt')">BELTS</div>
    <div class="filter-btn" onclick="filterCategory('accessory')">ACCESSORIES</div>
  </div>

  <div class="products-grid" id="productsGrid">
    <!-- Products will be here -->
  </div>

  <!-- MINI CART -->
  <div id="miniCart">
    <h3 style="margin:0 0 12px 0;font-size:13px;letter-spacing:2px;">YOUR CART (<span id="cartCount">0</span>)</h3>
    <div id="cartItems" style="max-height:320px;overflow-y:auto;"></div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1);">
      <div style="display:flex;justify-content:space-between;font-weight:700;"><span>TOTAL</span><span id="cartTotal">₹0</span></div>
      <button onclick="checkout()" style="width:100%;margin-top:12px;padding:12px;background:#e53;color:#fff;border:none;border-radius:8px;font-size:11px;letter-spacing:2px;">CHECKOUT →</button>
    </div>
  </div>

  <footer>
    DEAD STOCK © 2026 • ALL RIGHTS RESERVED • MADE WITH GRIT
  </footer>

  <script>
    // Sample Products (you can add more later)
    const products = [
      {
        id: 1,
        name: "Vintage Denim Jacket",
        price: 999,
        category: "clothing",
        img: "🧥",
        badge: "NEW"
      },
      {
        id: 2,
        name: "Retro Watch",
        price: 799,
        category: "watch",
        img: "⌚",
        badge: ""
      },
      {
        id: 3,
        name: "Streetwear Hoodie",
        price: 1499,
        category: "clothing",
        img: "👕",
        badge: "NEW"
      },
      {
        id: 4,
        name: "Silver Band Ring",
        price: 499,
        category: "ring",
        img: "💍",
        badge: "SOLD",
        sold: true
      },
      {
        id: 5,
        name: "Leather Tactical Belt",
        price: 649,
        category: "belt",
        img: "🥋",
        badge: ""
      },
      {
        id: 6,
        name: "Vintage Scarf",
        price: 399,
        category: "accessory",
        img: "🧣",
        badge: "DROP 001"
      },
      {
        id: 7,
        name: "Vintage Gloves",
        price: 349,
        category: "accessory",
        img: "🧤",
        badge: ""
      },
      {
        id: 8,
        name: "Vintage Pocket Watch",
        price: 1199,
        category: "watch",
        img: "🕰️",
        badge: "NEW"
      }
    ];

    function renderProducts(filteredProducts) {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = '';

      filteredProducts.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.innerHTML = `
          <div class="product-img">
            ${product.img ? `<span style="font-size:100px">${product.img}</span>` : ''}
            ${product.badge ? `<div class="badge ${product.sold ? 'sold' : ''}">${product.badge}</div>` : ''}
          </div>
          <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-desc">Rare thrift • One of a kind</div>
            <div class="product-price">₹${product.price}</div>
            <button class="add-btn" ${product.sold ? 'disabled' : ''}>
              ${product.sold ? 'SOLD OUT' : 'ADD TO CART'}
            </button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Simple filter
    window.filterCategory = function(cat) {
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');

      if (cat === 'all') {
        renderProducts(products);
      } else {
        const filtered = products.filter(p => p.category === cat);
        renderProducts(filtered);
      }
    };

    // Cart functions (same as index)
    let cart = [];
    function addToCart(name, price, img = '') {
      cart.push({name, price, img});
      updateCart();
      showMiniCart();
    }
    function updateCart() {
      document.getElementById('cartCount').textContent = cart.length;
      document.getElementById('cartTotal').textContent = '₹' + cart.reduce((sum, item) => sum + item.price, 0);
      let html = '';
      cart.forEach((item, i) => {
        html += `<div style="display:flex;justify-content:space-between;align-items:center;margin:8px 0;font-size:13px;">
          <div>${item.name}</div>
          <div>₹${item.price} <span onclick="removeFromCart(${i})" style="color:#e53;cursor:pointer;margin-left:8px;">×</span></div>
        </div>`;
      });
      document.getElementById('cartItems').innerHTML = html || '<p style="color:#666;font-size:12px;">Cart empty</p>';
    }
    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCart();
    }
    function showMiniCart() {
      document.getElementById('miniCart').style.display = 'block';
    }
    function checkout() {
      if (cart.length === 0) return;
      alert("🔥 Thank you! Demo checkout.\n\nTotal: ₹" + cart.reduce((sum, item) => sum + item.price, 0) + "\n\nReal Razorpay coming soon.");
      cart = [];
      updateCart();
    }

    // Attach click listeners
    function attachCartListeners() {
      document.querySelectorAll('.add-btn').forEach(btn => {
        if (btn.disabled) return;
        btn.addEventListener('click', () => {
          const card = btn.closest('.product-card');
          const name = card.querySelector('.product-name').textContent;
          const priceText = card.querySelector('.product-price').textContent;
          const price = parseInt(priceText.replace('₹', '')) || 999;
          addToCart(name, price);
          btn.textContent = '✓ ADDED';
          setTimeout(() => btn.textContent = 'ADD TO CART', 1500);
        });
      });
    }

    // Initialize
    renderProducts(products);
    setTimeout(attachCartListeners, 300); // small delay for DOM

    // Re-attach when filters change
    const originalRender = renderProducts;
    renderProducts = function(...args) {
      originalRender(...args);
      setTimeout(attachCartListeners, 100);
    };
  </script>
</body>
</html>

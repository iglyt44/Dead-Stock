!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Dead Stock Vault</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e0db;
      padding: 2rem;
      min-height: 100vh;
      position: relative;
    }

    /* ---- CUSTOM BACKGROUND (NOW VISIBLE) ---- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: url('asset/bg-graffiti.jpg') center / cover no-repeat fixed;
      opacity: 0.25;
      z-index: -1;
      pointer-events: none;
    }

    .admin-container {
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #2a2725;
      padding-bottom: 1rem;
    }

    .logo img {
      height: 45px;
      width: auto;
      display: block;
      border: 1px solid #d4a373;
      border-radius: 6px;
      padding: 4px;
      background: #0b0a0a;
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-logout {
      background: #2a2725;
      color: #9e958e;
      border: 1px solid #3a3532;
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-logout:hover {
      background: #a03a3a;
      color: #fff;
      border-color: #a03a3a;
    }

    .back-link {
      color: #9e958e;
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover {
      color: #fff;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: #fff;
    }
    h1 span {
      color: #d4a373;
    }
    .subtitle {
      color: #9e958e;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-card {
      background: rgba(19, 17, 16, 0.92);
      backdrop-filter: blur(4px);
      border: 1px solid #2a2725;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2.5rem;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }
    @media (max-width: 600px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .form-group {
      margin-bottom: 1.2rem;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9e958e;
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      background: #1f1c1a;
      border: 1px solid #2a2725;
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      transition: border 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #d4a373;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .btn-primary {
      background: #d4a373;
      color: #0b0a0a;
      border: none;
      padding: 12px 32px;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: 60px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover {
      background: #e6b98a;
      transform: scale(1.02);
    }

    .btn-danger {
      background: #a03a3a;
      color: #fff;
      border: none;
      padding: 6px 16px;
      font-weight: 600;
      font-size: 0.75rem;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-danger:hover {
      background: #c44a4a;
    }

    .btn-edit {
      background: #2a5a7a;
      color: #fff;
      border: none;
      padding: 6px 16px;
      font-weight: 600;
      font-size: 0.75rem;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s;
      margin-right: 6px;
    }
    .btn-edit:hover {
      background: #3a7a9a;
    }

    .product-list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 12px;
    }
    .product-list-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .product-grid-admin {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.2rem;
    }

    .product-card-admin {
      background: rgba(19, 17, 16, 0.92);
      backdrop-filter: blur(4px);
      border: 1px solid #2a2725;
      border-radius: 14px;
      padding: 1.2rem;
      transition: border-color 0.2s;
    }
    .product-card-admin:hover {
      border-color: #d4a373;
    }
    .product-card-admin .emoji {
      font-size: 2.4rem;
      margin-bottom: 6px;
    }
    .product-card-admin .pname {
      font-weight: 700;
      font-size: 1rem;
    }
    .product-card-admin .pdesc {
      color: #9e958e;
      font-size: 0.85rem;
      margin: 4px 0 8px;
    }
    .product-card-admin .pprice {
      color: #d4a373;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .product-card-admin .actions {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .empty-msg {
      color: #6b625b;
      text-align: center;
      padding: 2rem 0;
      grid-column: 1 / -1;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #d4a373;
      color: #0b0a0a;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }

    /* PASSWORD OVERLAY */
    #authOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      padding: 20px;
    }
    #authOverlay.hidden {
      display: none;
    }

    .auth-box {
      background: #131110;
      border: 1px solid #3a3532;
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
      animation: fadeUp 0.5s ease;
    }

    .auth-box img {
      height: 55px;
      margin-bottom: 16px;
      border: 1px solid #d4a373;
      border-radius: 6px;
      padding: 4px;
      background: #0b0a0a;
    }

    .auth-box h2 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: 4px;
    }
    .auth-box h2 span {
      color: #d4a373;
    }

    .auth-box p {
      color: #9e958e;
      font-size: 0.9rem;
      margin-bottom: 1.8rem;
    }

    .auth-box input {
      width: 100%;
      padding: 14px 18px;
      background: #1f1c1a;
      border: 1px solid #2a2725;
      border-radius: 60px;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      letter-spacing: 2px;
      transition: border 0.2s;
      margin-bottom: 12px;
    }
    .auth-box input:focus {
      outline: none;
      border-color: #d4a373;
    }

    .auth-box .btn-unlock {
      width: 100%;
      background: #d4a373;
      color: #0b0a0a;
      border: none;
      padding: 14px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .auth-box .btn-unlock:hover {
      background: #e6b98a;
    }

    #authError {
      color: #e05a5a;
      font-weight: 600;
      font-size: 0.85rem;
      margin-top: 10px;
      display: none;
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <!-- PASSWORD OVERLAY -->
  <div id="authOverlay">
    <div class="auth-box">
      <img src="asset/logo.png" alt="Dead Stock Logo" onerror="this.alt='DEAD STOCK'; this.style.fontSize='20px'; this.style.fontWeight='bold'; this.style.color='#d4a373';" />
      <h2>VAULT <span>ADMIN</span></h2>
      <p>Enter the password to manage your drops.</p>
      <input type="password" id="passwordInput" placeholder="••••••••" autofocus />
      <button class="btn-unlock" onclick="verifyPassword()">🔓 Unlock</button>
      <div id="authError">❌ Wrong password. Try again.</div>
    </div>
  </div>

  <!-- MAIN ADMIN CONTENT -->
  <div class="admin-container" id="adminContent">
    <div class="admin-header">
      <a href="index.html" class="logo">
        <img src="asset/logo.png" alt="Dead Stock Logo" />
      </a>
      <div class="header-actions">
        <a href="index.html" class="back-link">← Store</a>
        <button class="btn-logout" onclick="logout()">🚪 Logout</button>
      </div>
    </div>

    <h1>⚙️ <span>VAULT</span> ADMIN</h1>
    <p class="subtitle">Add, edit, or remove products — changes appear instantly on the main store.</p>

    <div class="form-card">
      <form id="productForm">
        <input type="hidden" id="editId" value="" />
        <div class="form-row">
          <div class="form-group">
            <label>Product Name *</label>
            <input type="text" id="productName" placeholder="e.g. Vintage Nike Hoodie" required />
          </div>
          <div class="form-group">
            <label>Price (₹) *</label>
            <input type="number" id="productPrice" placeholder="e.g. 2200" required min="1" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Description</label>
            <input type="text" id="productDesc" placeholder="e.g. 90s reverse weave, rare colourway" />
          </div>
          <div class="form-group">
            <label>Emoji / Icon</label>
            <input type="text" id="productEmoji" placeholder="e.g. 🧥 or 👕" value="👕" maxlength="4" />
          </div>
        </div>
        <div class="form-group">
<label>Product Image</label>
<input type="file" id="productImage" accept="image/*">
<img id="previewImage" style="display:none;max-width:180px;margin-top:10px;border-radius:8px;">
</div>
<button type="submit" class="btn-primary" id="formBtn">➕ Add Product</button>
        <button type="button" class="btn-primary" id="cancelEditBtn" style="display:none; background:#555; margin-left:10px;">↩ Cancel</button>
      </form>
    </div>

    <div class="product-list-header">
      <h2>📦 Saved Products</h2>
      <span style="color:#9e958e; font-size:0.85rem;" id="productCount">0 items</span>
    </div>

    <div class="product-grid-admin" id="productGridAdmin">
      <div class="empty-msg">No products yet. Add your first drop above!</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const ADMIN_PASSWORD = 'deadstock2024';

    function checkAuth() {
      if (sessionStorage.getItem('adminAuth') === 'true') {
        document.getElementById('authOverlay').classList.add('hidden');
        document.getElementById('adminContent').style.display = 'block';
      } else {
        document.getElementById('authOverlay').classList.remove('hidden');
        document.getElementById('adminContent').style.display = 'none';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    function verifyPassword() {
      const input = document.getElementById('passwordInput').value;
      const errorEl = document.getElementById('authError');
      if (input === ADMIN_PASSWORD) {
        sessionStorage.setItem('adminAuth', 'true');
        errorEl.style.display = 'none';
        checkAuth();
        showToast('🔓 Welcome to the Vault!');
      } else {
        errorEl.style.display = 'block';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    function logout() {
      sessionStorage.removeItem('adminAuth');
      checkAuth();
      showToast('🔒 Vault locked.');
    }

    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') verifyPassword();
    });

    function getProducts() {
      try {
        const data = localStorage.getItem('deadstock_products');
        return data ? JSON.parse(data) : [];
      } catch {
        return [];
      }
    }

    function saveProducts(products) {
      localStorage.setItem('deadstock_products', JSON.stringify(products));
    }

    function renderAdminGrid() {
      const products = getProducts();
      const grid = document.getElementById('productGridAdmin');
      const count = document.getElementById('productCount');
      count.textContent = `${products.length} item${products.length !== 1 ? 's' : ''}`;
      if (products.length === 0) {
        grid.innerHTML = `<div class="empty-msg">No products yet. Add your first drop above!</div>`;
        return;
      }
      grid.innerHTML = products.map((p, index) => `
        <div class="product-card-admin">
          <div class="emoji">${p.emoji || '👕'}</div>
          <div class="pname">${p.name}</div>
          <div class="pdesc">${p.desc || ''}</div>
          <div class="pprice">₹${Number(p.price).toLocaleString()}</div>
          <div class="actions">
            <button class="btn-edit" onclick="editProduct(${index})">✎ Edit</button>
            <button class="btn-danger" onclick="deleteProduct(${index})">✕ Delete</button>
          </div>
        </div>
      `).join('');
    }

    function deleteProduct(index) {
      if (!confirm('Remove this product from the vault?')) return;
      const products = getProducts();
      products.splice(index, 1);
      saveProducts(products);
      renderAdminGrid();
      showToast('🗑️ Product removed');
    }

    function editProduct(index) {
      const products = getProducts();
      const p = products[index];
      if (!p) return;
      document.getElementById('editId').value = index;
      document.getElementById('productName').value = p.name || '';
      document.getElementById('productPrice').value = p.price || '';
      document.getElementById('productDesc').value = p.desc || '';
      document.getElementById('productEmoji').value = p.emoji || '👕';
      document.getElementById('formBtn').textContent = '💾 Update Product';
      document.getElementById('cancelEditBtn').style.display = 'inline-block';
      document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
    }

    document.getElementById('productForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const name = document.getElementById('productName').value.trim();
      const price = parseFloat(document.getElementById('productPrice').value);
      const desc = document.getElementById('productDesc').value.trim();
      const emoji = document.getElementById('productEmoji').value.trim() || '👕';
      const editIndex = document.getElementById('editId').value;
      if (!name || !price) {
        showToast('⚠️ Name and price are required');
        return;
      }
      const products = getProducts();
      const newProduct = { name, price, desc, emoji };
      if (editIndex !== '') {
        products[parseInt(editIndex)] = newProduct;
        saveProducts(products);
        showToast('✅ Product updated');
        document.getElementById('editId').value = '';
        document.getElementById('formBtn').textContent = '➕ Add Product';
        document.getElementById('cancelEditBtn').style.display = 'none';
      } else {
        products.push(newProduct);
        saveProducts(products);
        showToast('🎉 Product added!');
      }
      document.getElementById('productForm').reset();
      document.getElementById('productEmoji').value = '👕';
      renderAdminGrid();
    });

    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      document.getElementById('editId').value = '';
      document.getElementById('formBtn').textContent = '➕ Add Product';
      document.getElementById('cancelEditBtn').style.display = 'none';
      document.getElementById('productForm').reset();
      document.getElementById('productEmoji').value = '👕';
      showToast('↩ Edit cancelled');
    });

    const toastEl = document.getElementById('toast');
    let toastTimeout;

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2200);
    }

    document.getElementById('adminContent').style.display = 'none';
    checkAuth();
    renderAdminGrid();
  
document.getElementById('productImage').addEventListener('change',e=>{
 const f=e.target.files[0]; if(!f)return;
 const r=new FileReader();
 r.onload=x=>{const i=document.getElementById('previewImage');i.src=x.target.result;i.style.display='block';}
 r.readAsDataURL(f);
});

</script>

</body>
</html>

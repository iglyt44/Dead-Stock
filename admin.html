<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADMIN | DEAD STOCK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; font-family: 'Segoe UI', sans-serif; color: #fff; }
    /* ... (keep previous styles) ... */
    textarea { min-height: 100px; resize: vertical; }
  </style>
</head>
<body>
  <!-- ... previous nav and container ... -->

  <div class="form-grid">
    <input type="text" id="name" placeholder="Product Name" />
    <input type="number" id="price" placeholder="Price (₹)" />
    <select id="category"> ... same as before ... </select>
    
    <div>
      <button onclick="document.getElementById('fileInput').click()">📸 Choose Image</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="previewImage(event)">
      <img id="imagePreview" style="width:120px;height:120px;object-fit:cover;border-radius:8px;display:none;">
    </div>

    <input type="text" id="badge" placeholder="Badge (NEW, SOLD...)" />
    <select id="status"> ... same ... </select>
    
    <!-- New Field -->
    <textarea id="description" placeholder="Product Description (size, material, story etc.)"></textarea>
    
    <button onclick="addProduct()">ADD / UPDATE PRODUCT</button>
  </div>

  <!-- Rest of the table and script stays similar, but update addProduct and renderTable -->

  <script>
    // ... previous code ...

    window.addProduct = function() {
      const name = document.getElementById('name').value.trim();
      const price = parseInt(document.getElementById('price').value);
      const category = document.getElementById('category').value;
      const badge = document.getElementById('badge').value.trim();
      const status = document.getElementById('status').value;
      const imageData = document.getElementById('imagePreview').src || '';
      const description = document.getElementById('description').value.trim();

      if (!name || !price) { alert("Name and Price required!"); return; }

      const existingIndex = products.findIndex(p => p.name.toLowerCase() === name.toLowerCase());

      if (existingIndex !== -1) {
        products[existingIndex] = { ...products[existingIndex], price, category, imageData, badge, status, description };
        alert("✅ Product Updated!");
      } else {
        products.push({ id: Date.now(), name, price, category, imageData, badge, status, description: description || "Rare vintage piece. Curated with care." });
        alert("✅ Product Added!");
      }

      saveProducts();
      renderTable();
      // clear form...
    };

    // Update renderTable to show description preview if you want
  </script>
</body>
</html>
